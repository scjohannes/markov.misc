name: R CMD check

on:
  push:
    branches: [main, optim]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest, r: release }
          - { os: ubuntu-latest, r: devel }
          - { os: windows-latest, r: release }
          - { os: macos-latest, r: release }
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
      - name: Preinstall rmsb build helper
        if: runner.os == 'Linux'
        shell: Rscript {0}
        run: install.packages("rstantools")
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::rstantools
          install-pandoc: false
          needs: check
      - name: Check package
        run: |
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--ignore-vignettes", "--as-cran"),
            build_args = "--no-build-vignettes",
            error_on = "warning"
          )
        shell: Rscript {0}

  native-safety:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      SANITIZER: ${{ matrix.sanitizer }}
      ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - name: Preinstall rmsb build helper
        if: runner.os == 'Linux'
        shell: Rscript {0}
        run: install.packages("rstantools")
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::rstantools
          install-pandoc: false
          needs: check
      - name: Configure sanitizer
        run: |
          mkdir -p ~/.R
          cat > ~/.R/Makevars <<EOF
          CXXFLAGS=-O1 -g -Wall -Wextra -fno-omit-frame-pointer -fsanitize=${SANITIZER}
          SHLIB_CXXLD=g++ -fsanitize=${SANITIZER}
          EOF
      - name: Preload AddressSanitizer runtime
        if: matrix.sanitizer == 'address'
        run: echo "LD_PRELOAD=$(g++ -print-file-name=libasan.so)" >> "$GITHUB_ENV"
      - name: Install instrumented package
        run: |
          log="$RUNNER_TEMP/install-${SANITIZER}.log"
          R CMD INSTALL --preclean . 2>&1 | tee "$log"
          grep -E -- "-fsanitize=${SANITIZER}.* -c .*\\.cpp" "$log"
          grep -E -- "g\\+\\+.*-fsanitize=${SANITIZER}.* -shared .*markov\\.misc\\.so" "$log"
      - name: Run native and recursion tests
        run: |
          Rscript -e 'testthat::test_local(".", filter = "sops-native|fast_vs_slow_equivalence|orm-fast-path|sops-rmsb-second-order", load_package = "installed", stop_on_failure = TRUE)'

  valgrind:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - name: Preinstall rmsb build helper
        if: runner.os == 'Linux'
        shell: Rscript {0}
        run: install.packages("rstantools")
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::rstantools
          install-pandoc: false
          needs: check
      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Install package
        run: R CMD INSTALL .
      - name: Run native smoke tests under Valgrind
        run: |
          R -d "valgrind --tool=memcheck --leak-check=full --errors-for-leak-kinds=definite --suppressions=.github/valgrind.supp --error-exitcode=1" --vanilla -e 'library(markov.misc); testthat::test_file("tests/testthat/test-sops-native.R", stop_on_failure = TRUE)'
