name: Release benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools
          needs: check
      - name: Run serial benchmark gates
        run: Rscript benchmarks/benchmark-sops.R
      - name: Record environment
        run: Rscript -e 'writeLines(c(capture.output(sessionInfo()), paste("commit:", system("git rev-parse HEAD", intern = TRUE))), "benchmark-session.txt")'
      - uses: actions/upload-artifact@v4
        with:
          name: serial-benchmark-results
          path: |
            benchmark-results.csv
            benchmark-session.txt
